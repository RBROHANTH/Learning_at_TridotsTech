<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img_vs_figure_tag</title>
</head>
<body>
    <p>
  Check out our new brand identity: <br>
  <img src="img1.png" alt="Company Logo">
    </p>
    <br>
    <br>
        <figure>
            <img src="img2.png" alt="Bar chart showing Q1 growth">
        <figcaption>Figure 1.1: Company revenue growth during Q1.</figcaption>
        </figure>
<h3>Notes:</h3>
    <p>
Use <img> for standalone visualsApply the <img> tag when the graphic is purely decorative, tightly coupled with the sentence it sits in, or part of basic page elements like a company logo.html<p>
Use code with caution.Use <figure> for captioned or reference mediaApply the <figure> tag when your content functions like an illustration in a textbook—where the graphic supports the article and benefits from a descriptive label.html</p>
</body>
</html>
